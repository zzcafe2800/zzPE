<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#7fd3ff" />
  <title>第３回フォトイベント『青空編』</title>

  <style>
    :root{
      --sky:#7fd3ff;
      --sky2:#bfeaff;
      --txt:#f7fbff;
      --muted:rgba(247,251,255,.72);
      --muted2:rgba(247,251,255,.52);
      --shadowText: 0 10px 28px rgba(0,0,0,.60), 0 0 18px rgba(127,211,255,.18);
      --safeTop: env(safe-area-inset-top, 0px);
      --safeBot: env(safe-area-inset-bottom, 0px);
      --serif: "Hiragino Mincho ProN","Yu Mincho","YuMincho","Noto Serif JP","MS Mincho",serif;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic","Meiryo",sans-serif;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    }

    *{box-sizing:border-box}
    html,body{height:100%;margin:0;background:#000;color:var(--txt);font-family:var(--sans);overflow:hidden}
    button{font-family:inherit}
    .hidden{display:none !important}
    .no-select{user-select:none;-webkit-user-select:none}

    /* ===== App root ===== */
    #app{position:relative;min-height:100%;}

    /* ===== Background video ===== */
    #bgVideo{
      position:fixed; inset:0;
      width:100%; height:100%;
      object-fit:cover;
      z-index:0;
      opacity:1;
      pointer-events:none;
      filter: contrast(1.05) saturate(1.08) brightness(.95);
      transform: translateZ(0);
    }

    /* ===== Black veil: 6s solid black, then 5s fade out ===== */
    #veil{
      position:fixed; inset:0;
      background:#000;
      z-index:1;
      opacity:1;
      pointer-events:none;
      transition: opacity 5000ms ease;
    }
    #veil.fade{ opacity:0; }

    /* ===== Frost overlay (Home以外は “青+ぼかし” ) ===== */
    #frost{
      position:fixed; inset:0;
      z-index:2;
      pointer-events:none;
      opacity:0;
      transition: opacity 220ms ease;
      background: rgba(127,211,255,.12);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }
    #app.frost-on #frost{ opacity:1; }

    /* ===== Top controls (direct overlay, not card) ===== */
    #topControls{
      position:fixed;
      left:0; right:0;
      top:0;
      z-index:60;
      padding: calc(10px + var(--safeTop)) 14px 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      pointer-events:none;
    }
    .volWrap{
      pointer-events:auto;
      display:flex;
      align-items:center;
      gap:10px;
    }
    .volIcon{
      width:18px;height:18px; opacity:.92;
      filter: drop-shadow(0 8px 18px rgba(0,0,0,.35));
    }
    input[type="range"]{
      -webkit-appearance:none; appearance:none;
      width:160px;
      height:6px;
      border-radius:999px;
      outline:none;
      background: linear-gradient(90deg, rgba(127,211,255,.95), rgba(191,234,255,.92));
      opacity:.95;
    }
    input[type="range"]::-webkit-slider-thumb{
      -webkit-appearance:none; appearance:none;
      width:18px;height:18px;border-radius:50%;
      background: rgba(247,251,255,.92);
      border:1px solid rgba(255,255,255,.22);
      box-shadow: 0 12px 20px rgba(0,0,0,.45);
      cursor:pointer;
    }
    #statusText{
      pointer-events:none;
      font-size:12px;
      letter-spacing:.05em;
      color: rgba(247,251,255,.88);
      text-shadow: var(--shadowText);
      white-space:nowrap;
    }

    /* ===== Credits (avoid overlap) ===== */
    #creditBtn{
      position:fixed;
      right:14px;
      bottom: calc(12px + var(--safeBot));
      z-index:65;
      font-size:12px;
      letter-spacing:.06em;
      color: rgba(247,251,255,.52);
      text-shadow: var(--shadowText);
      cursor:pointer;
      user-select:none;
      opacity:.85;
    }
    #creditBtn:hover{ opacity:1; }

    /* ===== Screens base ===== */
    .screen{
      position:fixed; inset:0;
      z-index:10;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: calc(52px + var(--safeTop)) 16px calc(22px + var(--safeBot));
      overflow:auto;
    }

    /* ===== Loader: 水色背景に直接載せる ===== */
    #loaderScreen{
      background: linear-gradient(180deg, rgba(127,211,255,1), rgba(127,211,255,.92));
      z-index:200;
      flex-direction:column;
      gap:14px;
      text-align:center;
      padding-top: calc(64px + var(--safeTop));
    }
    #loadGif{
      width: 120px;
      height: 120px;
      object-fit:contain;
      display:block;
      margin: 0 auto;
      image-rendering:auto;
      filter: drop-shadow(0 18px 26px rgba(0,0,0,.25));
    }
    #loadingText{
      font-size: 14px;
      letter-spacing:.05em;
      color: rgba(10,18,26,.78);
      font-weight:700;
    }
    #tapHint{
      font-size: 12px;
      letter-spacing:.10em;
      color: rgba(10,18,26,.55);
      font-weight:800;
    }
    .barOuter{
      width: 240px;
      height: 16px;
      border-radius: 6px;
      background: rgba(0,0,0,.12);
      overflow:hidden;
      box-shadow: 0 10px 18px rgba(0,0,0,.12) inset;
    }
    .barFill{
      width:0%;
      height:100%;
      background: rgba(255,255,255,.85);
      transition: width 220ms ease;
    }

    /* ===== Home (超シンプル) ===== */
    #homeScreen{ z-index:20; }
    .homeWrap{
      width:min(980px, 100%);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      gap: 12px;
    }
    #homeTitle{
      font-family: var(--serif);
      font-weight: 600;
      letter-spacing:.06em;
      line-height:1.15;
      font-size: clamp(30px, 4.6vw, 54px);
      margin: 0;
      text-shadow: var(--shadowText);
    }
    #homeSub{
      margin: 0;
      font-size: 13px;
      letter-spacing:.04em;
      color: rgba(247,251,255,.86);
      text-shadow: var(--shadowText);
    }

    /* Title bubble float-in (keep, no extra UI) */
    .titleLetters{display:inline-block; white-space:pre-wrap}
    .letter{
      display:inline-block;
      opacity:0;
      filter: blur(18px);
      transform: translateY(64px) rotate(var(--rot, 0deg));
      will-change: transform, opacity, filter;
      position:relative;
      color: rgba(247,251,255,.96);
      text-shadow: var(--shadowText);
    }
    @keyframes floatIn{
      0%{opacity:0;filter:blur(18px);transform:translate3d(calc(var(--sx,0px)*1.0),70px,0) rotate(var(--rot,0deg));}
      55%{opacity:1;filter:blur(6px);transform:translate3d(calc(var(--sx,0px)*.6),12px,0) rotate(calc(var(--rot,0deg)*.35));}
      85%{filter:blur(1.6px);transform:translate3d(calc(var(--sx,0px)*.25),-2px,0) rotate(calc(var(--rot,0deg)*.12));}
      100%{opacity:1;filter:blur(0px);transform:translate3d(0,0,0) rotate(0deg);}
    }
    @keyframes shimmerHold{
      0%,100%{ text-shadow: var(--shadowText); }
      50%{ text-shadow: 0 10px 28px rgba(0,0,0,.60), 0 0 26px rgba(127,211,255,.26); }
    }
    .letter.hold{ animation: shimmerHold 5200ms ease-in-out infinite; }

    /* Bubble canvas behind title only */
    #bubbleCanvas{
      position:fixed;
      inset:0;
      z-index:19;
      pointer-events:none;
      opacity:.75;
      filter: drop-shadow(0 12px 26px rgba(0,0,0,.35));
    }

    /* Home buttons (only 2, minimal) */
    .homeBtns{
      margin-top: 10px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap: 18px;
      flex-wrap:wrap;
    }
    #homeJoinBtn{
      height:54px;
      min-width: 220px;
      padding: 0 22px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.22);
      background: rgba(0,0,0,.28);
      color: rgba(247,251,255,.96);
      font-weight: 850;
      letter-spacing:.10em;
      cursor:pointer;
      text-shadow: var(--shadowText);
      box-shadow: 0 18px 40px rgba(0,0,0,.35);
    }
    #homeJoinBtn:hover{ filter: brightness(1.08); }
    #homeJoinBtn:active{ transform: translateY(1px); }
    #homeJoinBtn[disabled]{ opacity:.55; cursor:not-allowed; }

    #homeDetailsBtn{
      border: none;
      background: transparent;
      color: rgba(247,251,255,.92);
      font-weight: 800;
      letter-spacing:.10em;
      cursor:pointer;
      text-shadow: var(--shadowText);
      padding: 10px 8px;
      text-decoration: underline;
      text-underline-offset: 6px;
      opacity:.92;
    }
    #homeDetailsBtn:hover{ opacity:1; }
    #homeDetailsBtn:active{ transform: translateY(1px); }

    /* ===== Simple header row (no card) ===== */
    .simpleTopRow{
      width:min(920px, 100%);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom: 12px;
    }
    .simpleTitle{
      margin:0;
      font-family: var(--serif);
      letter-spacing:.06em;
      font-size: 20px;
      text-shadow: var(--shadowText);
    }
    .backBtn{
      height: 44px;
      padding: 0 16px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.26);
      color: rgba(247,251,255,.95);
      font-weight: 800;
      letter-spacing:.08em;
      cursor:pointer;
      text-shadow: var(--shadowText);
    }
    .backBtn:hover{ filter: brightness(1.08); }
    .backBtn:active{ transform: translateY(1px); }

    /* ===== Details: only image + dots + <> + title/back ===== */
    .detailsWrap{
      width:min(920px, 100%);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
    }
    .carousel{
      width:100%;
      border-radius: 18px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(127,211,255,.10);
      box-shadow: 0 18px 44px rgba(0,0,0,.32);
      position:relative;
    }
    .viewport{
      width:100%;
      aspect-ratio: 16/10;
      max-height: 68vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background: rgba(127,211,255,.12);
    }
    .viewport img{
      width:100%; height:100%;
      object-fit: contain;
      background: rgba(127,211,255,.10);
    }
    .navBtn{
      position:absolute;
      top:50%;
      transform: translateY(-50%);
      width: 44px; height:44px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.30);
      color: rgba(247,251,255,.95);
      cursor:pointer;
      box-shadow: 0 14px 26px rgba(0,0,0,.34);
    }
    .navBtn:hover{ filter: brightness(1.08); }
    .navBtn:active{ transform: translateY(-50%) scale(.98); }
    .navBtn.left{ left: 12px; }
    .navBtn.right{ right: 12px; }

    .dots{
      position:absolute;
      left:50%;
      bottom: 12px;
      transform: translateX(-50%);
      display:flex;
      gap:8px;
      padding: 10px 12px;
      border-radius: 999px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.26);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .dot{
      width:8px;height:8px;border-radius:50%;
      background: rgba(247,251,255,.38);
      border:1px solid rgba(255,255,255,.12);
      cursor:pointer;
      transition: transform 160ms ease, background 160ms ease;
    }
    .dot.on{ background: rgba(191,234,255,.88); transform: scale(1.18); }

    /* ===== Join: center content, minimal rows + fixed bottom-right join button ===== */
    .joinWrap{
      width:min(920px, 100%);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap: 10px;
      position:relative;
      padding-bottom: 84px; /* room for fixed button */
    }
    .sessionList{
      width:100%;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .sessionRow{
      width:100%;
      border:1px solid rgba(255,255,255,.14);
      border-radius: 18px;
      background: rgba(0,0,0,.22);
      padding: 14px 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
      cursor:pointer;
      box-shadow: 0 16px 36px rgba(0,0,0,.26);
    }
    .sessionRow:hover{ filter: brightness(1.06); }
    .sessionRow.on{
      border-color: rgba(191,234,255,.35);
      background: rgba(127,211,255,.16);
    }
    .sessionMain{
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    .sessionName{
      margin:0;
      font-family: var(--serif);
      letter-spacing:.06em;
      font-size: 18px;
      text-shadow: var(--shadowText);
    }
    .sessionNow{
      font-size: 13px;
      letter-spacing:.05em;
      color: rgba(247,251,255,.86);
      text-shadow: var(--shadowText);
    }
    .sessionNote{
      font-size:12px;
      letter-spacing:.04em;
      color: rgba(247,251,255,.78);
      text-shadow: var(--shadowText);
      margin-top: 6px;
    }

    #joinConfirmBtn{
      position:fixed;
      right: 14px;
      bottom: calc(14px + var(--safeBot));
      z-index:80;
      height: 54px;
      padding: 0 22px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.20);
      background: rgba(0,0,0,.34);
      color: rgba(247,251,255,.96);
      font-weight: 900;
      letter-spacing:.10em;
      cursor:pointer;
      box-shadow: 0 20px 46px rgba(0,0,0,.40);
      text-shadow: var(--shadowText);
    }
    #joinConfirmBtn:hover{ filter: brightness(1.08); }
    #joinConfirmBtn:active{ transform: translateY(1px); }
    #joinConfirmBtn[disabled]{ opacity:.55; cursor:not-allowed; }

    /* ===== Wait: card only (center), big headline, then "土曜/21:00〜" line, then description, bottom-right cancel ===== */
    .waitWrap{
      width:min(680px, 100%);
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .waitCard{
      width:100%;
      border-radius: 22px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.28);
      box-shadow: 0 24px 64px rgba(0,0,0,.40);
      padding: 18px 18px 70px;
      position:relative;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    #waitHeadline{
      margin: 2px 0 8px;
      font-family: var(--serif);
      font-size: 22px;
      letter-spacing:.06em;
      text-shadow: var(--shadowText);
    }
    #waitWhen{
      margin: 0 0 14px;
      font-size: 14px;
      letter-spacing:.05em;
      color: rgba(247,251,255,.90);
      text-shadow: var(--shadowText);
    }
    #waitDesc{
      margin:0;
      font-size: 15px;
      line-height:1.7;
      letter-spacing:.03em;
      color: rgba(247,251,255,.92);
      text-shadow: var(--shadowText);
    }
    #leaveBtn{
      position:absolute;
      right: 14px;
      bottom: 14px;
      height: 48px;
      padding: 0 18px;
      border-radius: 999px;
      border:1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.30);
      color: rgba(247,251,255,.95);
      font-weight: 900;
      letter-spacing:.10em;
      cursor:pointer;
      box-shadow: 0 16px 36px rgba(0,0,0,.35);
      text-shadow: var(--shadowText);
    }
    #leaveBtn:hover{ filter: brightness(1.08); }
    #leaveBtn:active{ transform: translateY(1px); }

    /* ===== Toast ===== */
    #toast{
      position:fixed;
      left:50%;
      bottom: calc(78px + var(--safeBot));
      transform: translateX(-50%);
      z-index:500;
      padding: 12px 14px;
      border-radius: 999px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.32);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: rgba(247,251,255,.92);
      font-size: 13px;
      letter-spacing:.03em;
      box-shadow: 0 18px 40px rgba(0,0,0,.36);
      opacity:0;
      pointer-events:none;
      transition: opacity 180ms ease, transform 180ms ease;
      text-shadow: var(--shadowText);
      white-space:nowrap;
    }
    #toast.on{ opacity:1; transform: translateX(-50%) translateY(-4px); }

    /* ===== Credits modal ===== */
    #creditModal{
      position:fixed; inset:0;
      z-index:300;
      display:none;
      align-items:center;
      justify-content:center;
      padding: 16px;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    #creditModal.on{ display:flex; }
    .modalCard{
      width:min(560px, 100%);
      border-radius: 22px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.40);
      box-shadow: 0 22px 60px rgba(0,0,0,.46);
      padding: 16px;
    }
    .modalCard h3{
      margin: 0 0 8px;
      font-family: var(--serif);
      letter-spacing:.06em;
      text-shadow: var(--shadowText);
    }
    .modalCard pre{
      margin: 10px 0 0;
      padding: 12px;
      border-radius: 14px;
      background: rgba(0,0,0,.30);
      border:1px solid rgba(255,255,255,.10);
      color: rgba(247,251,255,.86);
      font-family: var(--mono);
      font-size: 12px;
      line-height:1.55;
      white-space:pre-wrap;
      word-break:break-word;
    }
    .modalActions{ display:flex; justify-content:flex-end; margin-top: 12px; }
  </style>
</head>

<body>
<div id="app" class="no-select">
  <video id="bgVideo" playsinline muted loop preload="auto"></video>
  <div id="veil"></div>
  <div id="frost"></div>

  <!-- Top controls (homeでも表示) -->
  <div id="topControls">
    <div class="volWrap" title="サイト内の音量（BGM/効果音）">
      <svg class="volIcon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M4 10v4c0 .55.45 1 1 1h3l4 3c.66.5 1.6.03 1.6-.8V6.8c0-.83-.94-1.3-1.6-.8l-4 3H5c-.55 0-1 .45-1 1Z" stroke="rgba(247,251,255,.92)" stroke-width="1.6" stroke-linejoin="round"/>
        <path d="M16 9c1.2 1.2 1.2 4.8 0 6" stroke="rgba(191,234,255,.85)" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M18.5 6.5c2.4 2.4 2.4 8.6 0 11" stroke="rgba(127,211,255,.65)" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <input id="volSlider" type="range" min="0" max="100" value="50" />
    </div>
    <div id="statusText">接続：準備中</div>
  </div>

  <div id="creditBtn" class="hidden">クレジット</div>

  <!-- Loader (tap anywhere) -->
  <section id="loaderScreen" class="screen">
    <img id="loadGif" alt="loading" />
    <div id="loadingText">ロード中</div>
    <div class="barOuter" aria-hidden="true"><div id="progressFill" class="barFill"></div></div>
    <div id="tapHint">タップで開始</div>
  </section>

  <!-- Bubble canvas (home only) -->
  <canvas id="bubbleCanvas" class="hidden"></canvas>

  <!-- HOME -->
  <section id="homeScreen" class="screen hidden">
    <div class="homeWrap">
      <h1 id="homeTitle">
        <span class="titleLetters" id="titleLetters"></span>
      </h1>
      <p id="homeSub">土曜 / 日曜　21:00〜22:00</p>

      <div class="homeBtns">
        <button id="homeJoinBtn">参加</button>
        <button id="homeDetailsBtn">イベント詳細</button>
      </div>
    </div>
  </section>

  <!-- DETAILS -->
  <section id="detailsScreen" class="screen hidden">
    <div class="detailsWrap">
      <div class="simpleTopRow">
        <h2 class="simpleTitle">イベント詳細</h2>
        <button class="backBtn" id="backFromDetails">戻る</button>
      </div>

      <div class="carousel" id="carousel">
        <div class="viewport" id="carViewport">
          <img id="carImage" alt="detail image" />
          <button class="navBtn left" id="carPrev" aria-label="前へ">‹</button>
          <button class="navBtn right" id="carNext" aria-label="次へ">›</button>
          <div class="dots" id="carDots" aria-label="ページ"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- JOIN -->
  <section id="joinScreen" class="screen hidden">
    <div class="joinWrap">
      <div class="simpleTopRow">
        <h2 class="simpleTitle">参加予定にする</h2>
        <button class="backBtn" id="backFromJoin">戻る</button>
      </div>

      <div class="sessionList">
        <div class="sessionRow" id="rowSat" role="button" tabindex="0">
          <div class="sessionMain">
            <p class="sessionName">☀ 土曜 / 21:00</p>
            <div class="sessionNow">現在：<span id="badgeSat">…</span></div>
          </div>
        </div>

        <div class="sessionRow" id="rowSun" role="button" tabindex="0">
          <div class="sessionMain">
            <p class="sessionName">🌊 日曜 / 21:00</p>
            <div class="sessionNow">現在：<span id="badgeSun">…</span></div>
          </div>
        </div>
      </div>

      <div class="sessionNote">各回 4〜10名ほどで開催予定です</div>
    </div>

    <button id="joinConfirmBtn" disabled>参加予定にする</button>
  </section>

  <!-- WAIT -->
  <section id="waitScreen" class="screen hidden">
    <div class="waitWrap">
      <div class="waitCard">
        <div class="simpleTopRow" style="margin:0 0 8px;">
          <h2 class="simpleTitle">待機</h2>
          <button class="backBtn" id="backFromWait">戻る</button>
        </div>

        <div id="waitHeadline">参加予定に追加しました🌤</div>

  /* =========================================================
    Bubble canvas (home only)
  ========================================================= */
  const bctx = bubbleCanvas.getContext("2d", { alpha:true });
  const bubbles = [];
  let bubbleRAF = 0;
  let lastT = 0;

  function resizeCanvas(){
    const dpr = Math.min(2, window.devicePixelRatio || 1);
    bubbleCanvas.width  = Math.floor(window.innerWidth * dpr);
    bubbleCanvas.height = Math.floor(window.innerHeight * dpr);
    bubbleCanvas.style.width = window.innerWidth + "px";
    bubbleCanvas.style.height = window.innerHeight + "px";
    bctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener("resize", resizeCanvas, {passive:true});

  function spawnBubble(){
    const w = window.innerWidth, h = window.innerHeight;
    const r = 6 + Math.random()*18;
    bubbles.push({
      x: Math.random()*w,
      y: h + r + Math.random()*40,
      r,
      spd: 12 + Math.random()*28,
      phase: Math.random()*Math.PI*2,
      amp: 10 + Math.random()*18,
      wob: 0.9 + Math.random()*1.2,
      life: 0,
      alpha: 0.14 + Math.random()*0.22
    });
  }

  function drawBubble(b){
    const g = bctx.createRadialGradient(b.x - b.r*0.35, b.y - b.r*0.35, b.r*0.2, b.x, b.y, b.r);
    g.addColorStop(0, `rgba(255,255,255,${b.alpha*0.55})`);
    g.addColorStop(0.45, `rgba(191,234,255,${b.alpha*0.22})`);
    g.addColorStop(1, `rgba(127,211,255,0)`);

    bctx.beginPath();
    bctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
    bctx.fillStyle = g;
    bctx.fill();

    bctx.beginPath();
    bctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
    bctx.strokeStyle = `rgba(247,251,255,${b.alpha*0.55})`;
    bctx.lineWidth = 1;
    bctx.stroke();
  }

  function bubbleLoop(t){
    const dt = Math.min(0.033, (t - lastT)/1000 || 0.016);
    lastT = t;
    const w = window.innerWidth, h = window.innerHeight;

    bctx.clearRect(0,0,w,h);

    const isMobile = matchMedia("(max-width: 720px)").matches;
    const targetCount = isMobile ? 22 : 34;
    if (bubbles.length < targetCount && Math.random() < (isMobile ? 0.65 : 0.85)){
      spawnBubble();
      if (!isMobile && Math.random() < 0.35) spawnBubble();
    }

    for (let i=bubbles.length-1;i>=0;i--){
      const b = bubbles[i];
      b.life += dt;
      b.y -= b.spd * dt;
      b.x += Math.sin(b.life * b.wob + b.phase) * (b.amp * dt);

      const topFade = Math.max(0, Math.min(1, (b.y / (h*0.35))));
      const saved = b.alpha;
      b.alpha = saved * (0.35 + topFade*0.65);

      drawBubble(b);

      b.alpha = saved;
      if (b.y < -b.r - 30 || b.x < -80 || b.x > w + 80) bubbles.splice(i,1);
    }

    bubbleRAF = requestAnimationFrame(bubbleLoop);
  }

  /* =========================================================
    ★ システム修正（要望）
    いったん待機になった人は「予定を外す」まで別日程へ変更できない
    → joinSession で current がある場合は必ず拒否
  ========================================================= */
  async function joinSession(targetSessionId){
    if (!uid) { showToast("認証がまだです…"); return; }

    try{
      await runTransaction(db, async (tx)=>{
        const uref = userDocRef(uid);
        const uSnap = await tx.get(uref);
        const current = uSnap.exists() ? (uSnap.data().sessionId || null) : null;

        // ★ すでに参加中なら「外してから」
        if (current){
          throw new Error("MUST_LEAVE_FIRST");
        }

        const target = (targetSessionId === CONFIG.sessions.sat.id) ? CONFIG.sessions.sat : CONFIG.sessions.sun;

        const sref = sessionDocRef(target.id);
        const sSnap = await tx.get(sref);
        const sData = sSnap.exists() ? sSnap.data() : {count:0, capacity: target.capacity, hardMax: target.hardMax};

        const count = Number(sData.count ?? 0);
        const cap = Number(sData.capacity ?? target.capacity);
        const hard = Number(sData.hardMax ?? target.hardMax);

        if (count >= cap || count >= hard){
          throw new Error("CLOSED");
        }

        // participant
        const pref = participantDocRef(target.id, uid);
        const pSnap = await tx.get(pref);
        if (pSnap.exists()){
          // 万一残ってたら整合だけ合わせる
          tx.set(uref, { sessionId: target.id, updatedAt: serverTimestamp() }, { merge:true });
          return;
        }

        tx.set(pref, { joinedAt: serverTimestamp() }, { merge:true });
        tx.set(uref, { sessionId: target.id, updatedAt: serverTimestamp() }, { merge:true });
        tx.set(sref, { updatedAt: serverTimestamp() }, { merge:true });
        tx.set(sref, { count: count + 1 }, { merge:true });
      });

      await loadMyState();
      showToast("参加予定に追加しました🌤");
      showScreen("wait");
    }catch(e){
      if (e?.message === "MUST_LEAVE_FIRST"){
        showToast("変更は「予定を外す」後にできます", 2200);
      }else if (e?.message === "CLOSED"){
        showToast("この回は受付終了です", 1800);
      }else{
        console.error(e);
        showToast("参加登録に失敗しました", 2000);
      }
    }
  }

  async function leaveSession(){
    if (!uid) return;
    try{
      await runTransaction(db, async (tx)=>{
        const uref = userDocRef(uid);
        const uSnap = await tx.get(uref);
        const current = uSnap.exists() ? (uSnap.data().sessionId || null) : null;
        if (!current) return;

        const sref = sessionDocRef(current);
        const pref = participantDocRef(current, uid);

        const sSnap = await tx.get(sref);
        const pSnap = await tx.get(pref);

        if (pSnap.exists()){
          tx.delete(pref);
          if (sSnap.exists()){
            const c = Number(sSnap.data().count ?? 0);
            tx.set(sref, { count: Math.max(0, c-1), updatedAt: serverTimestamp() }, { merge:true });
          }
        }else{
          // participant無しでも userだけ外す
          tx.set(sref, { updatedAt: serverTimestamp() }, { merge:true });
        }

        tx.set(uref, { sessionId: null, updatedAt: serverTimestamp() }, { merge:true });
      });

      await loadMyState();
      showToast("予定を外しました");
      showScreen("join");
    }catch(e){
      console.error(e);
      showToast("キャンセルに失敗しました", 2000);
    }
  }

  /* =========================================================

    - 最初から load.gif 表示

    - black veil: 6s fully black, then 5s fade out
  ========================================================= */
  function isLowPower(){
    const mobile = matchMedia("(max-width: 720px)").matches;
    const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;
    return mobile || reduce;
  }

  async function preloadAssets(){
    const jobs = [];

    const imgs = [
      CONFIG.assets.loadGif,
      ...CONFIG.assets.preloadImages,
      ...CONFIG.detailImages
    ].filter(Boolean);

    imgs.forEach((src)=>{
      jobs.push(new Promise((res)=>{
        const img = new Image();
        img.onload = ()=>res({ok:true, src});
        img.onerror = ()=>res({ok:false, src});
        img.src = src;
      }));
    });

    const vids = [CONFIG.assets.bgVideo, ...CONFIG.assets.preloadVideos].filter(Boolean);
    vids.forEach((src)=>{
      jobs.push(new Promise((res)=>{
        const v = document.createElement("video");
        v.preload = "metadata";
        v.onloadedmetadata = ()=>res({ok:true, src});
        v.onerror = ()=>res({ok:false, src});
        v.src = src;
      }));
    });

    const auds = [CONFIG.assets.bgm, ...CONFIG.assets.preloadAudio].filter(Boolean);
    auds.forEach((src)=>{
      jobs.push(new Promise((res)=>{
        const a = new Audio();
        a.preload = "metadata";
        a.onloadedmetadata = ()=>res({ok:true, src});
        a.onerror = ()=>res({ok:false, src});
        a.src = src;
      }));
    });

    const total = Math.max(1, jobs.length);
    let done = 0;
    const concurrency = isLowPower() ? 4 : 8;
    let idx = 0;

    function tick(){
      done++;
      const p = Math.round((done/total)*100);
      progressFill.style.width = p + "%";
    }

    const runners = new Array(concurrency).fill(0).map(async ()=>{
      while (idx < jobs.length){
        const j = jobs[idx++];
        try{ await j; }catch(_){}
        tick();
      }
    });

    await Promise.all(runners);
    progressFill.style.width = "100%";
  }

  async function initFirebaseAuth(){
    setStatus("接続：認証中");
    await signInAnonymously(auth);
    return new Promise((res)=>{
      const off = onAuthStateChanged(auth, (user)=>{
        if (user){
          uid = user.uid;
          off();
          res(user);
        }
      });
    });
  }

  async function ensureSessionDocs(){
    const all = [CONFIG.sessions.sat, CONFIG.sessions.sun];
    for (const s of all){
      const ref = sessionDocRef(s.id);
      const snap = await getDoc(ref);
      if (!snap.exists()){
        await setDoc(ref, { count:0, capacity:s.capacity, hardMax:s.hardMax, createdAt: serverTimestamp(), updatedAt: serverTimestamp() }, { merge:true });
      }else{
        await setDoc(ref, { capacity:s.capacity, hardMax:s.hardMax, updatedAt: serverTimestamp() }, { merge:true });
      }
    }
  }

  async function startBgmAndTitle(){
    // bg video start (muted loop)
    bgVideo.src = CONFIG.assets.bgVideo;
    try{ await bgVideo.play(); }catch(_){}

    // black veil timing: 6s stay black, then fade 5s
    setTimeout(()=>veil.classList.add("fade"), 6000);

    // BGM
    BGM.src = CONFIG.assets.bgm;
    bgmBase = master.bgmBaseStart;
    applyBgmVolume();
    try{ await BGM.play(); }catch(e){
      // ok: user can tap again
      showToast("音が出ない場合はもう一度タップ", 2400);
    }

    // ramp 0.20 -> 0.60 over 4s
    const start = performance.now();
    const dur = 4000;
    const step = ()=>{
      const t = performance.now() - start;
      const k = Math.max(0, Math.min(1, t/dur));
      bgmBase = master.bgmBaseStart + (master.bgmBaseEnd - master.bgmBaseStart) * k;
      applyBgmVolume();
      if (k < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);

    // title letters + bubbles (start when BGM starts)
    buildTitleLetters(CONFIG.eventTitle);
    resizeCanvas();
    cancelAnimationFrame(bubbleRAF);
    bubbleRAF = requestAnimationFrame(bubbleLoop);
  }

  // Initial: show loader, start dots, show gif immediately
  function bootVisual(){
    showScreen("loader");
    loadGif.src = CONFIG.assets.loadGif;
    startDots();
    progressFill.style.width = "0%";
    setMasterVolume(Number(volSlider.value)/100);
    creditText.textContent = CONFIG.credits;
    setCarouselImages(CONFIG.detailImages);
  }
  bootVisual();

  let started = false;
  loaderScreen.addEventListener("click", async ()=>{
    if (started) return;
    started = true;

    setStatus("接続：開始");
    try{
      await initFirebaseAuth();
      setStatus("接続：Firestore準備");
      await ensureSessionDocs();
      attachSessionListeners();
      await loadMyState();
      setStatus("接続：OK");
    }catch(e){
      console.error(e);
      setStatus("接続：エラー");
      // UIは続行
    }

    // preload
    await preloadAssets();
    stopDots();

    // start bgm/title and go home
    await startBgmAndTitle();
    showScreen("home");
  });

  /* =========================================================
    Home -> Details/Join gating:
    - 参加中は homeJoinBtn が disabled (再応募不可)
    - Join画面へは未参加のみ
    - 参加中の人がどこかで joinSession を呼んでも必ず拒否（外すまで変更不可）

<script>
(() => {
  // =========================
  // 改善版：炭酸 burst を「短く噴いて、残りが自然に抜ける」へ
  // - 密度を下げて隙間を残す
  // - 生成は最初だけ（下から無限に出さない）
  // - 突然消えない（自然減 + 最後にゆっくりフェード）
  // - 背景が見える程度に薄く（目立ちすぎ防止）
  // - 粒サイズは既存と同帯（6〜24px）
  // =========================

  const $ = (s) => document.querySelector(s);

  const homeScreen = $("#homeScreen");
  const homeSub = $("#homeSub");
  const homeJoinBtn = $("#homeJoinBtn");
  const homeDetailsBtn = $("#homeDetailsBtn");
  const volSlider = $("#volSlider");

  // --- pushu.mp3 ---
  const pushu = new Audio("pushu.mp3");
  pushu.preload = "auto";
  pushu.playsInline = true;

  function masterVol01(){
    const v = Number(volSlider?.value ?? 50);
    return Math.max(0, Math.min(1, v / 100));
  }
  if (volSlider){
    volSlider.addEventListener("input", () => {
      pushu.volume = Math.min(1, masterVol01() * 0.70); // 少し控えめ
    });
  }
  pushu.volume = Math.min(1, masterVol01() * 0.70);

  // --- Home UI：最初は非表示 ---
  function hardHideHomeUI(){
    if (!homeSub || !homeJoinBtn || !homeDetailsBtn) return;
    const hide = (el) => {
      el.style.opacity = "0";
      el.style.transform = "translateY(10px)";
      el.style.filter = "blur(6px)";
      el.style.pointerEvents = "none";
      el.style.transition = "none";
    };
    hide(homeSub); hide(homeDetailsBtn); hide(homeJoinBtn);
  }
  function reveal(el, sec){
    if (!el) return;
    el.style.willChange = "opacity, transform, filter";
    el.style.transition = `opacity ${sec}s ease, transform ${sec}s ease, filter ${sec}s ease`;
    requestAnimationFrame(() => {
      el.style.opacity = "1";
      el.style.transform = "translateY(0px)";
      el.style.filter = "blur(0px)";
      el.style.pointerEvents = "auto";
    });
  }

  // =========================
  // Burst canvas
  // =========================
  let canvas = null, ctx = null;
  let raf = 0;
  const bubbles = [];
  let startMs = 0;
  let durationMs = 1500;

  // ✅ 生成するのは最初の少しだけ（炭酸の“噴き上げ”）
  const SPAWN_WINDOW_MS = 350;      // 0.35秒だけ生成
  const MAX_BUBBLES = 140;          // 画面が埋まらない上限（隙間確保）

  function ensureCanvas(){
    if (canvas) return;
    canvas = document.createElement("canvas");
    canvas.id = "burstCanvas";
    canvas.style.position = "fixed";
    canvas.style.inset = "0";
    canvas.style.zIndex = "21";
    canvas.style.pointerEvents = "none";
    canvas.style.opacity = "0";
    canvas.style.transition = "opacity 350ms ease";
    document.body.appendChild(canvas);
    ctx = canvas.getContext("2d", { alpha:true });

    const resize = () => {
      const dpr = Math.min(2, window.devicePixelRatio || 1);
      canvas.width = Math.floor(window.innerWidth * dpr);
      canvas.height = Math.floor(window.innerHeight * dpr);
      canvas.style.width = window.innerWidth + "px";
      canvas.style.height = window.innerHeight + "px";
      ctx.setTransform(dpr,0,0,dpr,0,0);
    };
    resize();
    window.addEventListener("resize", resize, {passive:true});
  }

  function spawn(){
    if (bubbles.length >= MAX_BUBBLES) return;

    const w = window.innerWidth, h = window.innerHeight;


    const r = 6 + Math.random() * 18;

  
    const x = Math.random() * w;

    
    const y = h + r + Math.random() * 40;

   
    const spd = 260 + Math.random() * 420;

    const amp = 8 + Math.random() * 14;
    const wob = 1.0 + Math.random() * 1.2;

   
    const alpha = 0.08 + Math.random() * 0.12;

    bubbles.push({ x, y, r, spd, amp, wob, phase: Math.random()*Math.PI*2, life: 0, alpha });
  }

  function draw(b, globalFade){
    const a = b.alpha * globalFade;


    const g = ctx.createRadialGradient(
      b.x - b.r*0.35, b.y - b.r*0.35, b.r*0.2,
      b.x, b.y, b.r
    );
    g.addColorStop(0, `rgba(255,255,255,${a*0.45})`);
    g.addColorStop(0.55, `rgba(191,234,255,${a*0.18})`);
    g.addColorStop(1, `rgba(127,211,255,0)`);

    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
    ctx.fillStyle = g;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(247,251,255,${a*0.30})`;
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  function runBurst(ms=1500){
    ensureCanvas();
    durationMs = ms;
    bubbles.length = 0;
    startMs = performance.now();

    // 出現は“ふわっ”と（急にドンと出ない）
    canvas.style.opacity = "1";

    // SE
    try{
      pushu.currentTime = 0;
      pushu.volume = Math.min(1, masterVol01() * 0.70);
      pushu.play().catch(()=>{});
    }catch(_){}

    let last = startMs;

    const loop = (t) => {
      const w = window.innerWidth, h = window.innerHeight;
      const dt = Math.min(0.033, (t - last)/1000 || 0.016);
      last = t;

      ctx.clearRect(0,0,w,h);

      const elapsed = t - startMs;
      const p = Math.max(0, Math.min(1, elapsed / durationMs)); // 0..1

      
      if (elapsed < SPAWN_WINDOW_MS) {
        // 初動だけ少し多め → すぐ落ち着く（隙間残す）
        const k = 1 - (elapsed / SPAWN_WINDOW_MS); // 1→0
        const perFrame = Math.floor(4 + 10*k);     // 14→4 程度
        for (let i=0;i<perFrame;i++) spawn();
      }

      const globalFade = (p < 0.70) ? 1 : (1 - (p - 0.70) / 0.30);

      // canvasも同様にゆっくり
      canvas.style.opacity = String(Math.max(0, Math.min(1, globalFade)));

      for (let i=bubbles.length-1;i>=0;i--){
        const b = bubbles[i];
        b.life += dt;
        b.y -= b.spd * dt;
        b.x += Math.sin(b.life * b.wob + b.phase) * (b.amp * dt);

        // 上に行くほど薄く（既存寄せ）
        const topFade = Math.max(0, Math.min(1, (b.y / (h*0.35))));
        const local = (0.35 + topFade*0.65);

        draw(b, globalFade * local);

        // 
        if (b.y < -b.r - 60 || b.x < -120 || b.x > w + 120){
          bubbles.splice(i,1);
        }
      }

      if (elapsed < durationMs || bubbles.length > 0){
        raf = requestAnimationFrame(loop);
      } else {
        cancelAnimationFrame(raf);
        raf = 0;
        canvas.style.opacity = "0";
      }
    };

    cancelAnimationFrame(raf);
    raf = requestAnimationFrame(loop);
  }

  // =========================
  // schedule（home表示を起点）
  // =========================
  let scheduled = false;

  function schedule(){
    if (scheduled) return;
    scheduled = true;

    hardHideHomeUI();

    const fadeEnd = 11000;    // 既存：tap後11秒で黒が消える
    const advance = 4800;     // あなたの環境で遅れてた分

    // 「黒フェイドが消える0.5秒前から」→ それを前倒し
    const burstAt = Math.max(0, fadeEnd - 500 - advance);

    setTimeout(() => runBurst(1500), burstAt);

    // UI表示シーケンスはそのまま
    setTimeout(() => {
      reveal(homeSub, 3);
      setTimeout(() => reveal(homeDetailsBtn, 3), 2000);
      setTimeout(() => reveal(homeJoinBtn, 5), 5000);
    }, fadeEnd);
  }

  // home表示で開始
  const mo = new MutationObserver(() => {
    if (homeScreen && !homeScreen.classList.contains("hidden")) schedule();
  });
  if (homeScreen) mo.observe(homeScreen, { attributes:true, attributeFilter:["class"] });
  if (homeScreen && !homeScreen.classList.contains("hidden")) schedule();
})();
</script>

  <script>
(() => {
  const $ = (s) => document.querySelector(s);

  // ====== ① 「参加中」をクリックで待機へ ======
  const appRoot = $("#app");
  const homeJoinBtn = $("#homeJoinBtn");
  const bubbleCanvas = $("#bubbleCanvas");
  const creditBtn = $("#creditBtn");

  const loaderScreen  = $("#loaderScreen");
  const homeScreen    = $("#homeScreen");
  const detailsScreen = $("#detailsScreen");
  const joinScreen    = $("#joinScreen");
  const waitScreen    = $("#waitScreen");

  function gotoWaitScreen(){
    // 既存の showScreen("wait") 相当を“外から”再現（安全にDOMだけ）
    if (loaderScreen)  loaderScreen.classList.add("hidden");
    if (homeScreen)    homeScreen.classList.add("hidden");
    if (detailsScreen) detailsScreen.classList.add("hidden");
    if (joinScreen)    joinScreen.classList.add("hidden");
    if (waitScreen)    waitScreen.classList.remove("hidden");

    // Home以外はぼかしON
    if (appRoot) appRoot.classList.add("frost-on");

    // 泡キャンバスはHome専用（待機では隠す）
    if (bubbleCanvas) bubbleCanvas.classList.add("hidden");

    // クレジットは表示（loader以外）
    if (creditBtn) creditBtn.classList.remove("hidden");

    document.body.style.overflow = "hidden";
  }

  function enableJoinBtnAsGotoWait(){
    if (!homeJoinBtn) return;

    // 「参加中」のときだけ “押せる” にする
    const isJoining = (homeJoinBtn.textContent || "").includes("参加中");
    if (!isJoining) return;

    // disabledを解除して、クリックを待機へ
    homeJoinBtn.disabled = false;
    homeJoinBtn.style.cursor = "pointer";
    homeJoinBtn.title = "待機画面を開く";

    // 二重登録防止
    if (homeJoinBtn.dataset.gotoWaitBound === "1") return;
    homeJoinBtn.dataset.gotoWaitBound = "1";

    homeJoinBtn.addEventListener("click", (e) => {
      // 参加中なら待機へ
      gotoWaitScreen();
    });
  }

  // homeJoinBtnの状態変化を監視（参加→参加中に変わった瞬間にも対応）
  if (homeJoinBtn) {
    const moBtn = new MutationObserver(enableJoinBtnAsGotoWait);
    moBtn.observe(homeJoinBtn, { attributes:true, attributeFilter:["disabled"], childList:true, subtree:true });
    // 初回も試す
    enableJoinBtnAsGotoWait();
  }

  // ====== ② 背景動画：PC mad.mp4 / スマホ mad1.mp4 ======
  const bgVideo = $("#bgVideo");
  const PC_SRC = "mad.mp4";
  const MOB_SRC = "mad1.mp4";

  function isMobile(){
    // 画面幅 + ユーザー環境を軽く判定（どっちか当たればスマホ扱い）
    return matchMedia("(max-width: 720px)").matches ||
           (navigator.userAgent && /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent));
  }

  async function swapBgVideoIfNeeded(){
    if (!bgVideo) return;

    const target = isMobile() ? MOB_SRC : PC_SRC;

    // すでに同じなら何もしない
    const current = (bgVideo.getAttribute("src") || bgVideo.src || "");
    if (current.includes(target)) return;

    // 再生位置をできるだけ維持
    const t = bgVideo.currentTime || 0;
    const wasPaused = bgVideo.paused;

    try{
      bgVideo.src = target;
      bgVideo.load();

      // metadata待ち（短め）
      await new Promise((res) => {
        const to = setTimeout(res, 400);
        bgVideo.onloadedmetadata = () => { clearTimeout(to); res(); };
      });

      // 同じ時間に合わせる（できる範囲で）
      try { bgVideo.currentTime = Math.min(t, (bgVideo.duration||t)); } catch(_){}

      if (!wasPaused) {
        bgVideo.play().catch(()=>{});
      }
    }catch(_){}
  }

  // 背景動画は「開始後」に既存moduleが src を入れるので、
  // bgVideoのsrcが入ったタイミングを監視して差し替える
  if (bgVideo) {
    const moVid = new MutationObserver(() => swapBgVideoIfNeeded());
    moVid.observe(bgVideo, { attributes:true, attributeFilter:["src"] });
    // 念のため periodic でも1回だけ（開始直後のレース対策）
    setTimeout(swapBgVideoIfNeeded, 1200);
  }

  // 端末回転/リサイズで切り替え（スマホ⇄PC幅のとき）
  window.addEventListener("resize", () => {
    // 負荷軽く：少し遅延
    clearTimeout(window.__bgSwapTimer);
    window.__bgSwapTimer = setTimeout(swapBgVideoIfNeeded, 180);
  }, { passive:true });

})();
</script>
