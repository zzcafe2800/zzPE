<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Photo Event Simple</title>
  <style>
    :root{
      --bg1:#89ccff;
      --bg2:#dff3ff;
      --ink:#2f5672;
      --ink2:#527a98;
      --white:rgba(255,255,255,.78);
      --line:rgba(255,255,255,.45);
      --shadow:0 16px 40px rgba(68,118,152,.16);
      --font:ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{font-family:var(--font);background:linear-gradient(180deg,var(--bg1),var(--bg2));overflow:hidden;color:var(--ink)}
    button,input{font:inherit}
    button{cursor:pointer;border:none}

    .app{position:relative;width:100%;height:100vh;overflow:hidden;background:linear-gradient(180deg,var(--bg1),var(--bg2))}
    .bg-media{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.22;pointer-events:none}
    .bg-overlay{position:absolute;inset:0;background:radial-gradient(circle at 20% 20%,rgba(255,255,255,.45),transparent 18%),radial-gradient(circle at 80% 15%,rgba(255,255,255,.3),transparent 14%),linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.18));pointer-events:none}

    .topbar{position:absolute;left:0;right:0;top:0;z-index:20;padding:14px 16px 0}
    .schedule-wrap{width:min(1200px,100%);margin:0 auto;background:rgba(255,255,255,.34);backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:26px;padding:16px 18px 18px;box-shadow:var(--shadow)}
    .schedule-title{text-align:center;font-size:13px;letter-spacing:.16em;color:var(--ink2);margin-bottom:10px}
    .schedule-line{position:relative;height:10px;border-radius:999px;background:rgba(255,255,255,.5);overflow:hidden}
    .schedule-fill{position:absolute;left:0;top:0;bottom:0;width:100%;background:linear-gradient(90deg,#7ad8ff 0%,#99f0c6 50%,#ffd88f 100%)}
    .schedule-points{display:grid;grid-template-columns:1.2fr 1fr 1fr 1fr .9fr;gap:12px;margin-top:12px;align-items:start}
    .schedule-step{text-align:center}
    .schedule-step h3{margin:0;font-size:16px;font-weight:700;color:var(--ink)}
    .schedule-step p{margin:6px 0 0;font-size:12px;line-height:1.5;color:var(--ink2)}

    .view{position:absolute;left:0;right:0;top:116px;bottom:92px;padding:12px 16px}
    .panel{display:none;width:min(1200px,100%);height:100%;margin:0 auto;background:rgba(255,255,255,.36);backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:30px;box-shadow:var(--shadow);overflow:hidden}
    .panel.active{display:block}
    .panel-inner{height:100%;overflow:auto;padding:22px}
    .panel-title{text-align:center;font-size:28px;letter-spacing:.12em;color:var(--ink);margin:6px 0 22px}

    .map-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
    .map-card{background:rgba(255,255,255,.5);border-radius:24px;padding:14px;box-shadow:0 10px 24px rgba(90,136,168,.12)}
    .map-thumb{width:100%;aspect-ratio:16/10;border-radius:18px;background:rgba(255,255,255,.6);display:grid;place-items:center;overflow:hidden}
    .map-thumb img{width:100%;height:100%;object-fit:cover;display:block}
    .map-fallback{color:var(--ink2);font-size:13px;letter-spacing:.08em}
    .map-name{text-align:center;margin-top:12px;font-size:18px;color:var(--ink)}
    .map-id{text-align:center;margin-top:6px;font-size:15px;color:var(--ink2);letter-spacing:.08em}

    .home-wrap{position:relative;min-height:100%}
    .home-main{display:grid;place-items:center;min-height:calc(100% - 20px);padding:30px 20px 90px;text-align:center}
    .home-card{width:min(560px,100%);background:rgba(255,255,255,.5);border-radius:28px;padding:28px 24px;box-shadow:0 10px 24px rgba(90,136,168,.12)}
    .home-card h3{margin:0 0 10px;font-size:28px;color:var(--ink)}
    .home-card p{margin:0;font-size:16px;line-height:1.8;color:var(--ink2)}
    .best-btn{position:absolute;right:18px;bottom:18px;padding:14px 18px;border-radius:999px;background:#111;color:#fff;box-shadow:0 12px 26px rgba(0,0,0,.18)}

    .edit-wrap{display:grid;grid-template-columns:320px 1fr;gap:18px;height:100%;align-items:stretch}
    .edit-tools,.edit-stage{background:rgba(255,255,255,.46);border-radius:26px;box-shadow:0 10px 24px rgba(90,136,168,.12)}
    .edit-tools{padding:18px;overflow:auto;display:flex;flex-direction:column;gap:16px}
    .edit-stage{position:relative;overflow:hidden;display:grid;place-items:center;padding:18px 18px 82px;min-height:460px}
    .tool-tabs{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:16px}
    .tool-tab{height:56px;border-radius:18px;background:rgba(255,255,255,.75);color:var(--ink);font-size:24px;display:grid;place-items:center;position:relative;overflow:visible}
    .tool-tab.active{background:#fff;box-shadow:0 8px 20px rgba(90,136,168,.12)}
    .tool-section{display:none;gap:14px;background:rgba(255,255,255,.4);border-radius:22px;padding:16px}
    .tool-section.active{display:grid}
    .tool-title{text-align:center;font-size:22px;color:var(--ink);letter-spacing:.12em}
    .tool-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
    .tool-row button,.tool-row label,.save-btn,.preset-btn{border-radius:999px;background:rgba(255,255,255,.82);padding:12px 16px;color:var(--ink)}
    .tool-row input{display:none}
    .slider-stack{display:grid;gap:14px}
    .slider-stack label{display:grid;gap:8px;color:var(--ink2)}
    .slider-stack input[type="range"]{width:100%}
    .stamp-palette{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .stamp-btn{background:rgba(255,255,255,.82);border-radius:18px;padding:8px;display:grid;place-items:center;min-height:84px;color:var(--ink2)}
    .stamp-btn img{max-width:100%;max-height:68px;display:block}
    .save-btn{background:rgba(121,240,187,.42)}
    .save-floating{position:absolute;left:18px;bottom:18px;z-index:10}
    .icon-tip{position:absolute;left:50%;top:calc(100% + 8px);transform:translateX(-50%);background:rgba(47,86,114,.94);color:#fff;border-radius:999px;padding:6px 10px;font-size:11px;letter-spacing:.08em;opacity:0;pointer-events:none;white-space:nowrap;transition:opacity .2s ease;z-index:20}
    .tool-tab:hover .icon-tip{opacity:1}

    .canvas-wrap{position:relative;width:100%;height:100%;border-radius:22px;overflow:hidden;background:rgba(255,255,255,.42);display:grid;place-items:center;-webkit-user-drag:none;user-select:none;touch-action:none}
    .canvas-wrap.grab-mode{cursor:grab}
    .canvas-wrap.grabbing{cursor:grabbing}
    .edit-image{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);display:none;max-width:none;max-height:none;-webkit-user-drag:none;user-select:none;pointer-events:none}
    .edit-stage.has-image .edit-image{display:block}
    .edit-placeholder{color:var(--ink2);font-size:16px;line-height:1.8;text-align:center;padding:24px}
    .edit-stage.has-image .edit-placeholder{display:none}
    .blur-mask{position:absolute;inset:0;pointer-events:none;backdrop-filter:blur(0px);mask-image:none;-webkit-mask-image:none}
    .blur-ring{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:50%;pointer-events:none;border:2px solid rgba(255,255,255,.9)}
    .stamp-layer{position:absolute;inset:0;pointer-events:none}
    .stamp-item{position:absolute;left:50%;top:50%;width:120px;pointer-events:auto;touch-action:none;user-select:none}
    .stamp-item.active{outline:2px solid rgba(121,240,187,.95);outline-offset:4px;border-radius:12px}

    .bottom-nav{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);display:flex;gap:28px;z-index:25}
    .nav-btn{background:transparent;color:rgba(47,86,114,.55);display:flex;flex-direction:column;align-items:center;gap:6px}
    .nav-btn.active{color:var(--ink)}
    .nav-ico{font-size:30px;line-height:1}
    .nav-label{font-size:11px;letter-spacing:.12em}

    @media (max-width:900px){
      .schedule-points{grid-template-columns:1fr 1fr;row-gap:14px}
      .view{top:154px}
      .map-grid{grid-template-columns:1fr}
      .edit-wrap{grid-template-columns:1fr}
      .stamp-palette{grid-template-columns:repeat(2,1fr)}
      .bottom-nav{gap:18px}
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <video class="bg-media" id="bgVideo" autoplay muted loop playsinline>
      <source src="mad.mp4" type="video/mp4">
    </video>
    <div class="bg-overlay"></div>

    <header class="topbar">
      <div class="schedule-wrap">
        <div class="schedule-title">今日の流れ</div>
        <div class="schedule-line"><div class="schedule-fill"></div></div>
        <div class="schedule-points">
          <div class="schedule-step"><h3>21:00 集合</h3><p>全員で集合写真</p></div>
          <div class="schedule-step"><h3>1マップ</h3><p>約25分<br>マップIDあり</p></div>
          <div class="schedule-step"><h3>2マップ</h3><p>約25分<br>マップIDあり</p></div>
          <div class="schedule-step"><h3>3マップ</h3><p>約20分<br>マップIDあり</p></div>
          <div class="schedule-step"><h3>最後</h3><p>SNS投稿<br>#ベストフォト</p></div>
        </div>
      </div>
    </header>

    <main class="view">
      <section class="panel active" id="panelMap">
        <div class="panel-inner">
          <h2 class="panel-title">マップ</h2>
          <div class="map-grid" id="mapGrid"></div>
        </div>
      </section>

      <section class="panel" id="panelHome">
        <div class="panel-inner home-wrap">
          <h2 class="panel-title">ホーム</h2>
          <div class="home-main">
            <div class="home-card">
              <h3>今日のイベント</h3>
              <p>上のスケジュールを見ながら進行してください。<br>右下のボタンから #ベストフォト を付けて気軽に投稿できます。</p>
            </div>
          </div>
          <button class="best-btn" id="bestPhotoBtn">#ベストフォト を投稿</button>
        </div>
      </section>

      <section class="panel" id="panelEdit">
        <div class="panel-inner">
          <h2 class="panel-title">加工</h2>
          <div class="edit-wrap">
            <div class="edit-tools">
              <div class="tool-tabs">
                <button class="tool-tab active" data-tool="gallery">🖼<span class="icon-tip">ギャラリー</span></button>
                <button class="tool-tab" data-tool="color">☼<span class="icon-tip">色合い</span></button>
                <button class="tool-tab" data-tool="stamp">✦<span class="icon-tip">スタンプ</span></button>
                <button class="tool-tab" data-tool="blur">◌<span class="icon-tip">ぼかし</span></button>
              </div>

              <div class="tool-section active" id="toolGallery">
                <div class="tool-title">ギャラリー</div>
                <div class="tool-row">
                  <label>画像を選ぶ<input type="file" id="editFileInput" accept="image/*"></label>
                  <button id="grabImageBtn">つかむ</button>
                  <button id="resetPositionBtn">位置リセット</button>
                </div>
                <div class="tool-row">
                  <button id="rotateBtn">回転</button>
                  <button id="flipBtn">反転</button>
                  <button id="zoomInBtn">拡大</button>
                  <button id="zoomOutBtn">縮小</button>
                  <button id="resetEditBtn">戻す</button>
                </div>
              </div>

              <div class="tool-section" id="toolColor">
                <div class="tool-title">色合い</div>
                <div class="tool-row"><button class="preset-btn" id="youthPresetBtn">青春っぽく</button></div>
                <div class="slider-stack">
                  <label>明るさ<input type="range" id="brightnessRange" min="50" max="170" value="100"></label>
                  <label>彩度<input type="range" id="saturationRange" min="50" max="200" value="100"></label>
                  <label>青より<input type="range" id="coolRange" min="0" max="60" value="0"></label>
                  <label>暖かさ<input type="range" id="warmthRange" min="-40" max="40" value="0"></label>
                </div>
              </div>

              <div class="tool-section" id="toolStamp">
                <div class="tool-title">スタンプ</div>
                <div class="stamp-palette" id="stampPalette"></div>
                <div class="slider-stack">
                  <label>大きさ<input type="range" id="stampSizeRange" min="20" max="260" value="120"></label>
                  <label>角度<input type="range" id="stampRotateRange" min="-180" max="180" value="0"></label>
                </div>
                <div class="tool-row"><button id="deleteStampBtn">選択スタンプ削除</button></div>
              </div>

              <div class="tool-section" id="toolBlur">
                <div class="tool-title">ぼかし</div>
                <div class="slider-stack">
                  <label>円の大きさ<input type="range" id="blurRadiusRange" min="10" max="48" value="26"></label>
                  <label>ぼかしの強さ<input type="range" id="blurStrengthRange" min="0" max="18" value="6"></label>
                  <label>境目のやわらかさ<input type="range" id="blurFeatherRange" min="8" max="42" value="18"></label>
                </div>
              </div>

              
            </div>

            <div class="edit-stage" id="editStage"><button class="save-btn save-floating" id="saveImageBtn">保存</button>
              <div class="canvas-wrap" id="editCanvasWrap" draggable="false">
                <img id="editPreview" class="edit-image" alt="編集プレビュー" draggable="false">
                <div class="blur-mask" id="blurPreviewMask"></div>
                <div class="blur-ring" id="blurFocusRing"></div>
                <div class="stamp-layer" id="stampLayer"></div>
                <div class="edit-placeholder" id="editPlaceholder">画像を読み込んで加工できます。<br>画像やスタンプが無くてもこのまま表示されます。</div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <nav class="bottom-nav">
      <button class="nav-btn active" data-panel="map"><div class="nav-ico">🗺</div><div class="nav-label">マップ</div></button>
      <button class="nav-btn" data-panel="home"><div class="nav-ico">⌂</div><div class="nav-label">ホーム</div></button>
      <button class="nav-btn" data-panel="edit"><div class="nav-ico">✦</div><div class="nav-label">加工</div></button>
    </nav>
  </div>

  <script>
    (() => {
      const CONFIG = {
        maps: [
          { name:'プール', id:'ZWF1DDPVR57G', image:'007.png' },
          { name:'歩道橋', id:'NV5GKJ2Y8504', image:'008.png' },
          { name:'３つのお部屋', id:'CD5X5ZH3ND0B', image:'009.png' }
        ],
        stampPalette: [
          { id:'s1', url:'stamp1.png' },
          { id:'s2', url:'stamp2.png' },
          { id:'s3', url:'stamp3.png' },
          { id:'s4', url:'stamp4.png' }
        ],
        bestPhotoText: '#ベストフォト '
      };

      const $ = (sel, root=document) => root.querySelector(sel);
      const $$ = (sel, root=document) => [...root.querySelectorAll(sel)];
      const state = {
        currentPanel:'map',
        editImageSrc:'',
        editRotation:0,
        editFlip:1,
        editScale:1,
        imageOffsetX:0,
        imageOffsetY:0,
        imageDrag:null,
        grabMode:false,
        color:{ brightness:100, saturation:100, warmth:0, cool:0 },
        blur:{ radius:26, strength:6, feather:18 },
        stamps:[],
        activeStampId:null,
        activeTool:'gallery'
      };

      const mapGrid = $('#mapGrid');
      const editStage = $('#editStage');
      const editPreview = $('#editPreview');
      const editCanvasWrap = $('#editCanvasWrap');
      const blurPreviewMask = $('#blurPreviewMask');
      const blurFocusRing = $('#blurFocusRing');
      const stampLayer = $('#stampLayer');
      const stampPalette = $('#stampPalette');
      const bestPhotoBtn = $('#bestPhotoBtn');
      const bgVideo = $('#bgVideo');

      function on(el, event, handler){ if (el) el.addEventListener(event, handler); }

      function setPanel(name){
        state.currentPanel = name;
        $('#panelMap').classList.toggle('active', name === 'map');
        $('#panelHome').classList.toggle('active', name === 'home');
        $('#panelEdit').classList.toggle('active', name === 'edit');
        $$('.nav-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.panel === name));
      }

      function buildMaps(){
        mapGrid.innerHTML = '';
        CONFIG.maps.forEach(map => {
          const card = document.createElement('div');
          card.className = 'map-card';
          card.innerHTML = `
            <div class="map-thumb">
              <img src="${map.image || ''}" alt="${map.name}">
              <div class="map-fallback">画像はあとから追加</div>
            </div>
            <div class="map-name">${map.name}</div>
            <div class="map-id">ID：${map.id}</div>
          `;
          const img = $('img', card);
          const fallback = $('.map-fallback', card);
          if (img) {
            img.addEventListener('load', () => { if (fallback) fallback.style.display = 'none'; });
            img.addEventListener('error', () => { img.style.display = 'none'; if (fallback) fallback.style.display = 'grid'; });
            if (!map.image) {
              img.style.display = 'none';
              if (fallback) fallback.style.display = 'grid';
            }
          }
          mapGrid.appendChild(card);
        });
      }

      function buildStampPalette(){
        stampPalette.innerHTML = '';
        CONFIG.stampPalette.forEach(item => {
          const btn = document.createElement('button');
          btn.className = 'stamp-btn';
          btn.type = 'button';
          btn.dataset.url = item.url || '';
          btn.innerHTML = `<img src="${item.url || ''}" alt="${item.id}"><span>${item.id}</span>`;
          const img = $('img', btn);
          if (img) {
            img.addEventListener('error', () => {
              img.remove();
              const span = $('span', btn);
              if (span) span.textContent = item.url || item.id;
            });
          }
          stampPalette.appendChild(btn);
        });
      }

      function applyEditTransform(){
        const hasImage = !!state.editImageSrc;
        editStage.classList.toggle('has-image', hasImage);
        editPreview.style.transform = `translate(calc(-50% + ${state.imageOffsetX}px), calc(-50% + ${state.imageOffsetY}px)) rotate(${state.editRotation}deg) scale(${state.editScale}) scaleX(${state.editFlip})`;
        editPreview.style.filter = `brightness(${state.color.brightness / 100}) saturate(${state.color.saturation / 100}) sepia(${Math.max(0, state.color.warmth / 100)}) hue-rotate(${state.color.warmth * -0.6 - state.color.cool * 0.8}deg)`;
        editPreview.style.opacity = String(Math.min(1, 0.96 + state.color.cool / 300));

        const inner = Math.max(0, state.blur.radius - state.blur.feather);
        const outer = state.blur.radius + state.blur.feather;
        const mask = `radial-gradient(circle at center, transparent 0%, transparent ${inner}%, rgba(0,0,0,.2) ${state.blur.radius}%, rgba(0,0,0,1) ${outer}%)`;
        blurPreviewMask.style.backdropFilter = `blur(${state.blur.strength * 1.5}px)`;
        blurPreviewMask.style.webkitMaskImage = mask;
        blurPreviewMask.style.maskImage = mask;
        blurFocusRing.style.width = `${state.blur.radius * 2}%`;
        blurFocusRing.style.height = `${state.blur.radius * 2}%`;
        editCanvasWrap.classList.toggle('grab-mode', state.grabMode);

        stampLayer.querySelectorAll('.stamp-item').forEach(el => {
          const stamp = state.stamps.find(v => v.id === el.dataset.id);
          if (!stamp) return;
          el.style.width = `${stamp.size}px`;
          el.style.transform = `translate(${stamp.x}px, ${stamp.y}px) rotate(${stamp.rotate}deg)`;
          el.classList.toggle('active', state.activeStampId === stamp.id);
        });
      }

      function setTool(name){
        state.activeTool = name;
        $$('.tool-tab').forEach(btn => btn.classList.toggle('active', btn.dataset.tool === name));
        $$('.tool-section').forEach(sec => sec.classList.remove('active'));
        const map = { gallery:'#toolGallery', color:'#toolColor', stamp:'#toolStamp', blur:'#toolBlur' };
        const target = $(map[name]);
        if (target) target.classList.add('active');
      }

      function syncStampControls(){
        const stamp = state.stamps.find(v => v.id === state.activeStampId);
        if (!stamp) return;
        $('#stampSizeRange').value = stamp.size;
        $('#stampRotateRange').value = stamp.rotate;
      }

      function addStamp(src){
        if (!src) return;
        const id = `stamp_${Date.now()}_${Math.random().toString(36).slice(2,6)}`;
        const stamp = { id, src, x:0, y:0, size:120, rotate:0 };
        state.stamps.push(stamp);
        state.activeStampId = id;

        const el = document.createElement('img');
        el.className = 'stamp-item';
        el.dataset.id = id;
        el.src = src;
        el.draggable = false;
        el.addEventListener('error', () => {
          el.remove();
          state.stamps = state.stamps.filter(v => v.id !== id);
          state.activeStampId = state.stamps[0]?.id || null;
          syncStampControls();
          applyEditTransform();
        });

        let drag = null;
        el.addEventListener('pointerdown', e => {
          const s = state.stamps.find(v => v.id === id);
          if (!s) return;
          state.activeStampId = id;
          drag = { x:e.clientX - s.x, y:e.clientY - s.y };
          el.setPointerCapture(e.pointerId);
          syncStampControls();
          applyEditTransform();
        });
        el.addEventListener('pointermove', e => {
          if (!drag) return;
          const s = state.stamps.find(v => v.id === id);
          if (!s) return;
          s.x = e.clientX - drag.x;
          s.y = e.clientY - drag.y;
          applyEditTransform();
        });
        el.addEventListener('pointerup', () => { drag = null; });
        el.addEventListener('pointercancel', () => { drag = null; });
        el.addEventListener('click', () => {
          state.activeStampId = id;
          syncStampControls();
          applyEditTransform();
        });

        stampLayer.appendChild(el);
        syncStampControls();
        applyEditTransform();
      }

      function saveEditedImage(){
        if (!state.editImageSrc) return;
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          const w = img.naturalWidth;
          const h = img.naturalHeight;
          canvas.width = w;
          canvas.height = h;

          ctx.filter = `brightness(${state.color.brightness / 100}) saturate(${state.color.saturation / 100}) sepia(${Math.max(0, state.color.warmth / 100)}) hue-rotate(${state.color.warmth * -0.6 - state.color.cool * 0.8}deg)`;
          ctx.translate(w / 2 + state.imageOffsetX, h / 2 + state.imageOffsetY);
          ctx.rotate((state.editRotation % 360) * Math.PI / 180);
          ctx.scale(state.editFlip * state.editScale, state.editScale);
          ctx.drawImage(img, -w / 2, -h / 2);
          ctx.setTransform(1,0,0,1,0,0);

          if (state.blur.strength > 0) {
            const blurCanvas = document.createElement('canvas');
            const blurCtx = blurCanvas.getContext('2d');
            blurCanvas.width = w;
            blurCanvas.height = h;
            blurCtx.filter = `blur(${state.blur.strength * 2}px)`;
            blurCtx.drawImage(canvas, 0, 0);

            const maskCanvas = document.createElement('canvas');
            const maskCtx = maskCanvas.getContext('2d');
            maskCanvas.width = w;
            maskCanvas.height = h;
            const cx = w / 2;
            const cy = h / 2;
            const r = Math.min(w, h) * (state.blur.radius / 100);
            const feather = Math.min(w, h) * (state.blur.feather / 200);
            const grad = maskCtx.createRadialGradient(cx, cy, Math.max(0, r - feather), cx, cy, r + feather);
            grad.addColorStop(0, 'rgba(0,0,0,0)');
            grad.addColorStop(0.7, 'rgba(0,0,0,0)');
            grad.addColorStop(1, 'rgba(0,0,0,1)');
            maskCtx.fillStyle = grad;
            maskCtx.fillRect(0, 0, w, h);

            const original = ctx.getImageData(0,0,w,h);
            const blurred = blurCtx.getImageData(0,0,w,h);
            const mask = maskCtx.getImageData(0,0,w,h);
            const out = ctx.createImageData(w,h);
            for (let i = 0; i < out.data.length; i += 4) {
              const m = mask.data[i + 3] / 255;
              out.data[i] = original.data[i] * (1 - m) + blurred.data[i] * m;
              out.data[i + 1] = original.data[i + 1] * (1 - m) + blurred.data[i + 1] * m;
              out.data[i + 2] = original.data[i + 2] * (1 - m) + blurred.data[i + 2] * m;
              out.data[i + 3] = 255;
            }
            ctx.putImageData(out, 0, 0);
          }

          const finish = () => {
            const link = document.createElement('a');
            link.download = 'edited-image.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
          };

          if (!state.stamps.length) {
            finish();
            return;
          }

          let loaded = 0;
          state.stamps.forEach(stamp => {
            const sImg = new Image();
            sImg.onload = () => {
              ctx.save();
              ctx.translate(w / 2 + stamp.x, h / 2 + stamp.y);
              ctx.rotate(stamp.rotate * Math.PI / 180);
              ctx.drawImage(sImg, -stamp.size / 2, -stamp.size / 2, stamp.size, stamp.size);
              ctx.restore();
              loaded += 1;
              if (loaded === state.stamps.length) finish();
            };
            sImg.onerror = () => {
              loaded += 1;
              if (loaded === state.stamps.length) finish();
            };
            sImg.src = stamp.src;
          });
        };
        img.src = state.editImageSrc;
      }

      function openBestPhoto(){
        const text = encodeURIComponent(CONFIG.bestPhotoText);
        const url = `https://x.com/intent/post?text=${text}`;
        window.open(url, '_blank', 'noopener,noreferrer');
      }

      function bind(){
        $$('.nav-btn').forEach(btn => on(btn, 'click', () => setPanel(btn.dataset.panel)));
        $$('.tool-tab').forEach(btn => on(btn, 'click', () => setTool(btn.dataset.tool)));
        on(bestPhotoBtn, 'click', openBestPhoto);

        on($('#editFileInput'), 'change', e => {
          const file = e.target.files?.[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = () => {
            state.editImageSrc = reader.result;
            editPreview.src = reader.result;
            state.editRotation = 0;
            state.editFlip = 1;
            state.editScale = 1;
            state.imageOffsetX = 0;
            state.imageOffsetY = 0;
            applyEditTransform();
          };
          reader.readAsDataURL(file);
        });

        on($('#grabImageBtn'), 'click', () => {
          state.grabMode = !state.grabMode;
          $('#grabImageBtn').classList.toggle('active', state.grabMode);
          editCanvasWrap.classList.toggle('grab-mode', state.grabMode);
        });
        on($('#resetPositionBtn'), 'click', () => {
          state.imageOffsetX = 0;
          state.imageOffsetY = 0;
          applyEditTransform();
        });
        on($('#rotateBtn'), 'click', () => { state.editRotation += 90; applyEditTransform(); });
        on($('#flipBtn'), 'click', () => { state.editFlip *= -1; applyEditTransform(); });
        on($('#zoomInBtn'), 'click', () => { state.editScale = Math.min(3, state.editScale + 0.1); applyEditTransform(); });
        on($('#zoomOutBtn'), 'click', () => { state.editScale = Math.max(0.4, state.editScale - 0.1); applyEditTransform(); });
        on($('#resetEditBtn'), 'click', () => {
          state.editRotation = 0;
          state.editFlip = 1;
          state.editScale = 1;
          state.imageOffsetX = 0;
          state.imageOffsetY = 0;
          state.color = { brightness:100, saturation:100, warmth:0, cool:0 };
          const coolRange = $('#coolRange');
          if (coolRange) coolRange.value = '0';
          state.blur = { radius:26, strength:6, feather:18 };
          applyEditTransform();
        });

        on($('#brightnessRange'), 'input', e => { state.color.brightness = Number(e.target.value); applyEditTransform(); });
        on($('#saturationRange'), 'input', e => { state.color.saturation = Number(e.target.value); applyEditTransform(); });
        on($('#coolRange'), 'input', e => { state.color.cool = Number(e.target.value); applyEditTransform(); });
        on($('#warmthRange'), 'input', e => { state.color.warmth = Number(e.target.value); applyEditTransform(); });
        on($('#youthPresetBtn'), 'click', () => {
          state.color.brightness = 112;
          state.color.saturation = 128;
          state.color.cool = 24;
          state.color.warmth = -6;
          $('#brightnessRange').value = String(state.color.brightness);
          $('#saturationRange').value = String(state.color.saturation);
          $('#coolRange').value = String(state.color.cool);
          $('#warmthRange').value = String(state.color.warmth);
          applyEditTransform();
        });
        on($('#blurRadiusRange'), 'input', e => { state.blur.radius = Number(e.target.value); applyEditTransform(); });
        on($('#blurStrengthRange'), 'input', e => { state.blur.strength = Number(e.target.value); applyEditTransform(); });
        on($('#blurFeatherRange'), 'input', e => { state.blur.feather = Number(e.target.value); applyEditTransform(); });
        on($('#stampSizeRange'), 'input', e => {
          const stamp = state.stamps.find(v => v.id === state.activeStampId);
          if (!stamp) return;
          stamp.size = Number(e.target.value);
          applyEditTransform();
        });
        on($('#stampRotateRange'), 'input', e => {
          const stamp = state.stamps.find(v => v.id === state.activeStampId);
          if (!stamp) return;
          stamp.rotate = Number(e.target.value);
          applyEditTransform();
        });
        on($('#deleteStampBtn'), 'click', () => {
          if (!state.activeStampId) return;
          state.stamps = state.stamps.filter(v => v.id !== state.activeStampId);
          const el = stampLayer.querySelector(`[data-id="${state.activeStampId}"]`);
          if (el) el.remove();
          state.activeStampId = state.stamps[0]?.id || null;
          syncStampControls();
          applyEditTransform();
        });
        on($('#saveImageBtn'), 'click', saveEditedImage);

        on(editCanvasWrap, 'pointerdown', e => {
          if (!state.grabMode || !state.editImageSrc) return;
          state.imageDrag = { x:e.clientX - state.imageOffsetX, y:e.clientY - state.imageOffsetY };
          editCanvasWrap.classList.add('grabbing');
          editCanvasWrap.setPointerCapture(e.pointerId);
        });
        on(editCanvasWrap, 'pointermove', e => {
          if (!state.imageDrag || !state.grabMode) return;
          state.imageOffsetX = e.clientX - state.imageDrag.x;
          state.imageOffsetY = e.clientY - state.imageDrag.y;
          applyEditTransform();
        });
        on(editCanvasWrap, 'pointerup', () => {
          state.imageDrag = null;
          editCanvasWrap.classList.remove('grabbing');
        });
        on(editCanvasWrap, 'pointercancel', () => {
          state.imageDrag = null;
          editCanvasWrap.classList.remove('grabbing');
        });

        on(stampPalette, 'click', e => {
          const btn = e.target.closest('[data-url]');
          if (!btn) return;
          addStamp(btn.dataset.url);
        });

        on(editCanvasWrap, 'dragstart', e => { e.preventDefault(); });
        on(editPreview, 'dragstart', e => { e.preventDefault(); });
        on(bgVideo, 'error', () => {
          bgVideo.style.display = 'none';
        });
      }

      function init(){
        buildMaps();
        buildStampPalette();
        bind();
        setPanel('map');
        setTool('gallery');
        applyEditTransform();
      }

      init();
    })();
  </script>
</body>
</html>
